<!DOCTYPE html>
<html lang="fr" data-theme="pop">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pour Hiwamari 🌻</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Thèmes : appliqué via data-theme sur <html>. themes.css archive les 8 thèmes. -->
  <link rel="stylesheet" href="themes.css" />
</head>
<body>
  <!-- Étoiles + pétales en fond (remplis par JS) -->
  <div class="bg-layer" id="bgLayer" aria-hidden="true"></div>

  <!-- Contrôle du son (apparaît une fois la musique lancée) -->
  <div class="sound-control" id="soundControl" hidden>
    <input class="volume-slider" id="volumeSlider" type="range" min="0" max="0.5" step="0.01" value="0.2"
           aria-label="Volume de la musique" />
    <button class="sound-btn" id="soundBtn" aria-label="Couper le son">🔊</button>
  </div>

  <!-- ÉCRAN 1 — ACCUEIL -->
  <section class="screen screen--home is-active" id="home">
    <div class="home-inner">
      <div class="sunflower sunflower--hero" id="heroSunflower" aria-hidden="true">
        <div class="sunflower__petals sunflower__petals--outer"></div>
        <div class="sunflower__petals sunflower__petals--inner"></div>
        <div class="sunflower__core"></div>
      </div>
      <p class="stream-counter" id="streamCounter" aria-live="off"></p>
      <h1 class="home-title" id="homeTitle">Hiwamari</h1>
      <p class="home-message">Shadow Garden et les flowy te souhaitent un bon retour !</p>
      <button class="enter-btn" id="enterBtn">Entrer</button>
    </div>
  </section>

  <!-- ÉCRAN 2 — SHOWCASE -->
  <section class="screen screen--showcase" id="showcase" aria-hidden="true" tabindex="-1">
    <div class="showcase-inner">
      <div class="composition">
        <div class="gallery">
          <figure class="stage" id="stage">
            <img class="stage__img" id="stageImg" src="" alt="" />
          </figure>
        </div>
        <div class="thumbs" id="thumbs" aria-label="Choisir une illustration"></div>
      </div>

      <div class="side-col">
        <aside class="flowy-card" id="flowyCard">
          <p class="flowy-card__title">Message des Flowy</p>
          <p class="flowy-card__text" id="flowyText">
            <span class="flowy-part is-active" data-part="1">Bon retour Mawi, tu nous a manqués <img class="flowy-card__emote" id="flowyEmoteNoo" src="" alt="" /></span>
            <span class="flowy-part" data-part="2">mais arrête de nous manger ou bouffe Juco stp <img class="flowy-card__emote" id="flowyEmote" src="" alt="" /></span>
          </p>
        </aside>

        <aside class="artist-card" id="artistCard">
          <img class="artist-card__pp" id="artistPp" src="" alt="Photo de profil de l'artiste" />
          <p class="artist-card__label">illustration par</p>
          <p class="artist-card__name" id="artistName"></p>
          <p class="artist-card__message" id="artistMessage"></p>
          <div class="artist-card__socials">
            <a class="social-btn social-btn--x" id="artistTwitter" href="#" target="_blank" rel="noopener noreferrer" aria-label="Profil X de l'artiste">
              <svg viewBox="0 0 24 24" fill="#000" aria-hidden="true">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
            </a>
            <a class="social-btn social-btn--vgen" id="artistVgen" href="#" target="_blank" rel="noopener noreferrer" aria-label="Profil VGen de l'artiste">
              <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <path fill="url(#vgen-grad)" d="M15.019 7.535a8.337 8.337 0 0 1 11.774.617l.248.275c1.409 1.527 2.666 3.731 2.612 5.905a4.5 4.5 0 0 1-.665 2.252l-.082.131q-.068.109-.187.291c-.159.242-.383.578-.664.977a36 36 0 0 1-2.31 2.959c-.938 1.073-2.134 2.29-3.497 3.273-1.282.924-3.23 2.019-5.574 2.019-2.297 0-4.268-1.059-5.573-1.934-1.407-.944-2.688-2.122-3.718-3.176a41 41 0 0 1-3.53-4.15l-.091-.125a4.469 4.469 0 0 1 7.252-5.221l.033.045.145.194a31 31 0 0 0 1.084 1.354 8.3 8.3 0 0 1 2.743-5.686"/>
                <path fill="#b8ff26" fill-rule="evenodd" d="M16.317 9.048a5.47 5.47 0 0 1 7.725.405l.26.287.002.004c1.175 1.268 1.897 2.791 1.863 3.913v.003c-.007.274-.084.55-.239.802l-.019.03-.044.071-.166.258c-.143.219-.35.528-.61.897a33 33 0 0 1-2.123 2.72c-.863.989-1.897 2.029-3.014 2.834-1.088.784-2.438 1.478-3.899 1.478-1.444 0-2.833-.681-3.975-1.448-1.179-.79-2.305-1.817-3.264-2.798a38 38 0 0 1-3.325-3.919l-.02-.028c-.143-.224-.234-.383-.283-.69A1.598 1.598 0 0 1 7.1 12.054c.48.106.76.353.967.632l.001.001.01.014.04.055.167.223a35 35 0 0 0 2.82 3.287c.88.9 1.833 1.757 2.757 2.377.962.645 1.7.905 2.191.905.363 0 .842-.145 1.424-.481l.406-.235-.355-.306a4 4 0 0 1-.322-.315l-1.294-1.438a5.47 5.47 0 0 1 .405-7.725m6.07 4.945a30 30 0 0 1-1.832 2.339l-.017.019-.233.266-2.006-1.98-.007-.006a2.268 2.268 0 1 1 3.37-3.035l.26.287c.25.279.465.588.572.933.11.355.099.732-.073 1.12l-.014.03z" clip-rule="evenodd"/>
                <defs><linearGradient id="vgen-grad" x1="29.654" x2="9.444" y1="5.393" y2="31.32" gradientUnits="userSpaceOnUse"><stop stop-color="#10121a"/><stop offset="1" stop-color="#0c090d"/></linearGradient></defs>
              </svg>
            </a>
          </div>
        </aside>
      </div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <button class="lightbox__close" id="lightboxClose" aria-label="Fermer">✕</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="" />
  </div>

  <audio id="bgAudio" loop preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
